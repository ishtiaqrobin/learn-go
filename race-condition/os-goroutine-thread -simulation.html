<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OS Thread vs Goroutine — Deep Dive</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0a0e14;
            --panel: #11161f;
            --panel-2: #0d121a;
            --line: #232b38;
            --line-soft: #1a212c;
            --text: #c7d0dc;
            --text-dim: #6b7686;
            --text-bright: #eef2f7;

            --stack: #ff8a7a;
            --stack-dim: #5a3934;
            --heap: #4fd8a8;
            --heap-dim: #2f4a3f;
            --code: #8aa6ff;
            --code-dim: #36406b;
            --pointer: #ffcc66;
            --value: #c792ea;
            --kernel: #ff6b9d;
            --kernel-dim: #5a2940;
            --java: #ff9e6b;
            --cpp: #6bb3ff;

            --kw: #ff8a7a;
            --type: #ffb454;
            --str: #4fd8a8;
            --com: #5b6677;
            --fn: #8aa6ff;
            --num: #ffb454;

            --sans: 'Space Grotesk', system-ui, sans-serif;
            --mono: 'JetBrains Mono', 'Courier New', monospace;
            --radius: 10px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 28px 28px 40px;
            background:
                radial-gradient(circle at 18% -10%, rgba(138, 166, 255, 0.08), transparent 45%),
                radial-gradient(circle at 85% 0%, rgba(255, 107, 157, 0.05), transparent 40%),
                var(--bg);
            font-family: var(--sans);
            color: var(--text);
            min-height: 100vh;
        }

        .masthead {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            max-width: 1520px;
            margin: 0 auto 18px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--line-soft);
            flex-wrap: wrap;
            gap: 10px;
        }

        .masthead h1 {
            font-size: 21px;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--text-bright);
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .masthead h1 .dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: var(--heap);
            box-shadow: 0 0 12px var(--heap);
        }

        .masthead .sub {
            font-family: var(--mono);
            font-size: 11.5px;
            color: var(--text-dim);
            letter-spacing: 0.04em;
        }

        .topic-tabs {
            display: flex;
            gap: 7px;
            max-width: 1520px;
            margin: 0 auto 16px;
            flex-wrap: wrap;
        }

        .topic-tab {
            font-family: var(--mono);
            font-size: 11.5px;
            font-weight: 600;
            background: var(--panel-2);
            color: var(--text-dim);
            border: 1px solid var(--line);
            padding: 8px 14px;
            border-radius: 20px;
            cursor: pointer;
            transition: all .2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .topic-tab .tdot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }

        .topic-tab.active {
            color: var(--text-bright);
            border-color: #3a4555;
            background: #161d27;
        }

        .container {
            display: grid;
            grid-template-columns: 0.95fr 1.5fr;
            gap: 16px;
            max-width: 1520px;
            margin: 0 auto;
        }

        .panel {
            background: linear-gradient(180deg, var(--panel), var(--panel-2));
            border: 1px solid var(--line);
            border-radius: var(--radius);
            box-shadow: 0 1px 0 rgba(255, 255, 255, 0.02) inset, 0 14px 30px -18px rgba(0, 0, 0, 0.7);
            overflow: hidden;
        }

        .code-panel .panel-head {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            border-bottom: 1px solid var(--line-soft);
            background: rgba(255, 255, 255, 0.015);
        }

        .traffic {
            display: flex;
            gap: 6px;
        }

        .traffic span {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }

        .traffic span:nth-child(1) {
            background: #ff5f57;
        }

        .traffic span:nth-child(2) {
            background: #febc2e;
        }

        .traffic span:nth-child(3) {
            background: #28c840;
        }

        .filename {
            font-family: var(--mono);
            font-size: 12px;
            color: var(--text-dim);
            margin-left: 4px;
        }

        .code-container {
            font-family: var(--mono);
            line-height: 1.62;
            font-size: 12.2px;
            padding: 12px 0 16px;
            white-space: pre;
            overflow-x: auto;
            min-height: 560px;
            max-height: 660px;
            overflow-y: auto;
        }

        .line {
            position: relative;
            padding: 1px 14px 1px 46px;
            transition: background-color .25s ease, border-color .25s ease;
            border-left: 3px solid transparent;
        }

        .line .ln {
            position: absolute;
            left: 12px;
            width: 24px;
            text-align: right;
            color: #3a4250;
            font-size: 10.5px;
            user-select: none;
        }

        .line.active {
            background: linear-gradient(90deg, rgba(79, 216, 168, 0.16), rgba(79, 216, 168, 0.03) 70%);
            border-left-color: var(--heap);
        }

        .line.faded {
            opacity: 0.4;
        }

        .line.kernel-active {
            background: linear-gradient(90deg, rgba(255, 107, 157, 0.18), rgba(255, 107, 157, 0.03) 70%);
            border-left-color: var(--kernel);
        }

        .kw {
            color: var(--kw);
            font-weight: 600;
        }

        .type {
            color: var(--type);
        }

        .com {
            color: var(--com);
            font-style: italic;
        }

        .fn {
            color: var(--fn);
        }

        .str {
            color: var(--str);
        }

        .num {
            color: var(--num);
        }

        .kernel-txt {
            color: var(--kernel);
            font-weight: 600;
        }

        .vis-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
            border-bottom: 1px solid var(--line-soft);
            background: rgba(255, 255, 255, 0.015);
        }

        .vis-head .label {
            font-size: 10.5px;
            letter-spacing: 0.1em;
            color: var(--text-dim);
            text-transform: uppercase;
            font-weight: 600;
        }

        .vis-head .phase {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--heap);
            background: rgba(79, 216, 168, 0.08);
            border: 1px solid rgba(79, 216, 168, 0.25);
            padding: 3px 9px;
            border-radius: 20px;
        }

        .vis-wrap {
            position: relative;
            padding: 18px;
            min-height: 560px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .vis-zone {
            border-radius: 8px;
            padding: 13px;
            background: var(--panel-2);
            border: 1.5px solid var(--line);
        }

        .vis-zone-title {
            font-family: var(--mono);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.09em;
            color: var(--text-dim);
            margin-bottom: 11px;
            display: flex;
            align-items: center;
            gap: 7px;
            text-transform: uppercase;
        }

        .vis-zone-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: currentColor;
            opacity: 0.2;
        }

        .info-strip {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text-dim);
            padding: 8px 11px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.02);
            margin-top: 7px;
        }

        /* ===== generic card/cell system reused across tabs ===== */
        .cell-row {
            display: flex;
            gap: 9px;
            flex-wrap: wrap;
        }

        .info-card {
            font-family: var(--mono);
            border-radius: 8px;
            padding: 10px 13px;
            background: #161d27;
            border: 1.5px solid var(--line);
            transition: all .3s cubic-bezier(.25, 1, .5, 1);
            position: relative;
        }

        .info-card .ic-title {
            font-size: 11.5px;
            font-weight: 700;
            color: var(--text-bright);
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
            justify-content: space-between;
        }

        .info-card .ic-sub {
            font-size: 9.5px;
            color: var(--text-dim);
            margin-bottom: 6px;
        }

        .info-card .ic-body {
            font-size: 12px;
            color: var(--text);
        }

        .info-card.active {
            transform: translateY(-3px);
            box-shadow: 0 8px 18px -8px rgba(0, 0, 0, 0.6);
        }

        .info-card.ghost {
            opacity: 0.28;
            border-style: dashed;
        }

        .info-card.done {
            opacity: 0.55;
        }

        .badge {
            font-size: 9px;
            font-weight: 700;
            padding: 1px 7px;
            border-radius: 20px;
            letter-spacing: 0.03em;
            white-space: nowrap;
        }

        /* state machine */
        .state-row {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .state-node {
            font-family: var(--mono);
            font-size: 11px;
            font-weight: 700;
            padding: 8px 14px;
            border-radius: 20px;
            background: #161d27;
            border: 1.5px solid var(--line);
            color: var(--text-dim);
            transition: all .3s ease;
        }

        .state-node.active {
            color: #0a0e14;
            box-shadow: 0 0 14px currentColor;
        }

        .state-arrow {
            color: var(--text-dim);
            font-size: 13px;
        }

        /* memory layout block (TCB / PCB / stack) */
        .mem-block {
            font-family: var(--mono);
            border-radius: 7px;
            padding: 9px 11px 10px;
            font-size: 11.5px;
            background: #161d27;
            border: 1px solid var(--line);
            position: relative;
            animation: blockIn .35s cubic-bezier(.25, 1, .5, 1);
        }

        @keyframes blockIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .mem-block .blk-title {
            font-weight: 700;
            font-size: 11px;
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }

        .mem-block .row {
            display: flex;
            gap: 6px;
            color: var(--text);
        }

        .mem-block .row .k {
            color: var(--text-dim);
            min-width: 90px;
            display: inline-block;
        }

        .mem-block .row .v {
            color: var(--text-bright);
            font-weight: 600;
        }

        /* run queue lanes (GMP) */
        .queue-lane {
            display: flex;
            gap: 7px;
            flex-wrap: wrap;
            min-height: 46px;
            align-items: center;
            padding: 8px;
            border-radius: 7px;
            background: #0d121a;
            border: 1px dashed var(--line-soft);
        }

        .g-chip {
            font-family: var(--mono);
            font-size: 10.5px;
            font-weight: 700;
            padding: 6px 11px;
            border-radius: 14px;
            background: rgba(138, 166, 255, 0.12);
            border: 1.5px solid var(--code-dim);
            color: var(--code);
            transition: all .35s cubic-bezier(.25, 1, .5, 1);
            white-space: nowrap;
        }

        .g-chip.running {
            background: var(--heap);
            color: #06140f;
            border-color: var(--heap);
            box-shadow: 0 0 12px rgba(79, 216, 168, 0.5);
        }

        .g-chip.stealing {
            animation: stealMove .6s cubic-bezier(.25, 1, .5, 1);
        }

        @keyframes stealMove {
            0% {
                transform: translateX(-30px) scale(0.8);
                opacity: 0.4;
            }

            100% {
                transform: translateX(0) scale(1);
                opacity: 1;
            }
        }

        .g-chip.blocked {
            background: rgba(255, 138, 122, 0.12);
            border-color: var(--stack-dim);
            color: var(--stack);
        }

        .g-chip.ghost {
            opacity: 0.25;
            border-style: dashed;
        }

        .m-box {
            font-family: var(--mono);
            border-radius: 8px;
            padding: 10px 12px;
            min-width: 120px;
            background: #161d27;
            border: 1.5px solid var(--line);
            text-align: center;
            transition: all .3s ease;
        }

        .m-box.busy {
            border-color: var(--heap);
            background: rgba(79, 216, 168, 0.08);
        }

        .m-box.detached {
            border-color: var(--stack);
            background: rgba(255, 138, 122, 0.08);
        }

        .m-box .mb-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-bright);
        }

        .m-box .mb-sub {
            font-size: 9.5px;
            color: var(--text-dim);
            margin-top: 2px;
        }

        .p-box {
            border-radius: 9px;
            padding: 11px;
            background: var(--panel-2);
            border: 1.5px solid var(--code-dim);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .p-box .pb-head {
            font-family: var(--mono);
            font-size: 10.5px;
            font-weight: 700;
            color: var(--code);
        }

        /* cost comparison bars */
        .cost-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .cost-label {
            font-family: var(--mono);
            font-size: 11px;
            width: 130px;
            color: var(--text-dim);
            flex-shrink: 0;
        }

        .cost-bar-track {
            flex: 1;
            height: 18px;
            background: #0d121a;
            border-radius: 9px;
            overflow: hidden;
            border: 1px solid var(--line-soft);
        }

        .cost-bar-fill {
            height: 100%;
            border-radius: 9px;
            transition: width 1s cubic-bezier(.25, 1, .5, 1);
            width: 0%;
        }

        .cost-bar-fill.thread {
            background: linear-gradient(90deg, var(--stack-dim), var(--stack));
        }

        .cost-bar-fill.goroutine {
            background: linear-gradient(90deg, var(--heap-dim), var(--heap));
        }

        .cost-value {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text-bright);
            width: 90px;
            text-align: right;
            flex-shrink: 0;
        }

        /* mutex lock visual */
        .lock-icon {
            font-size: 20px;
        }

        .mutex-door {
            font-family: var(--mono);
            border-radius: 8px;
            padding: 14px;
            text-align: center;
            background: #161d27;
            border: 2px solid var(--line);
            transition: all .3s ease;
            min-width: 140px;
        }

        .mutex-door.locked {
            border-color: var(--stack);
            background: rgba(255, 138, 122, 0.08);
        }

        .mutex-door.unlocked {
            border-color: var(--heap);
            background: rgba(79, 216, 168, 0.08);
        }

        /* bottom panel */
        .bottom-panel {
            grid-column: 1 / -1;
            padding: 18px 20px;
        }

        .stepper {
            display: flex;
            justify-content: flex-start;
            align-items: flex-start;
            position: relative;
            margin-bottom: 20px;
            padding: 0 4px;
            overflow-x: auto;
        }

        .step-track {
            position: relative;
            flex: 1;
            min-width: 680px;
        }

        .step-track::before {
            content: '';
            position: absolute;
            top: 13px;
            left: 28px;
            right: 28px;
            height: 2px;
            background: var(--line);
            z-index: 1;
        }

        .step-track .progress {
            position: absolute;
            top: 13px;
            left: 28px;
            height: 2px;
            background: var(--heap);
            z-index: 2;
            transition: width .35s cubic-bezier(.25, 1, .5, 1);
            width: 0%;
        }

        .step-track-inner {
            display: flex;
            justify-content: space-between;
            position: relative;
            z-index: 3;
        }

        .step {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            min-width: 50px;
        }

        .step-node {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--panel-2);
            border: 2px solid var(--line);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--mono);
            font-size: 9.5px;
            font-weight: 700;
            color: var(--text-dim);
            transition: all .3s ease;
        }

        .step.active .step-node {
            border-color: var(--heap);
            background: var(--heap);
            color: #06140f;
            box-shadow: 0 0 12px rgba(79, 216, 168, 0.55);
        }

        .step.done .step-node {
            border-color: var(--code-dim);
            color: var(--heap);
            background: transparent;
        }

        .step .step-label {
            font-size: 8px;
            color: var(--text-dim);
            text-align: center;
            max-width: 58px;
        }

        .step.active .step-label {
            color: var(--text-bright);
            font-weight: 600;
        }

        .controls {
            display: flex;
            gap: 12px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }

        button {
            font-family: var(--sans);
            font-weight: 600;
            font-size: 13px;
            background: var(--panel-2);
            color: var(--text);
            border: 1px solid var(--line);
            padding: 9px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all .15s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        button:hover:not(:disabled) {
            border-color: #3a4555;
            background: #161d27;
            transform: translateY(-1px);
        }

        button:active:not(:disabled) {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }

        #btnNext {
            background: linear-gradient(135deg, #2fae84, #4fd8a8);
            color: #06140f;
            border-color: transparent;
        }

        #btnNext:hover:not(:disabled) {
            filter: brightness(1.08);
        }

        .console-box {
            background: #05070a;
            border: 1px solid var(--line);
            border-left: 3px solid var(--heap);
            padding: 13px 15px;
            border-radius: 7px;
            font-size: 13px;
            line-height: 1.62;
            min-height: 50px;
            transition: border-left-color .3s ease;
        }

        .console-box .hl {
            color: var(--heap);
            font-weight: 700;
        }

        .console-box .hl-stack {
            color: var(--stack);
            font-weight: 700;
        }

        .console-box .hl-code {
            color: var(--code);
            font-weight: 600;
            font-family: var(--mono);
            font-size: 12px;
        }

        .console-box .hl-kernel {
            color: var(--kernel);
            font-weight: 700;
        }

        .console-box .hl-val {
            color: var(--value);
            font-weight: 700;
        }

        .console-box .hl-java {
            color: var(--java);
            font-weight: 700;
        }

        .console-box .hl-cpp {
            color: var(--cpp);
            font-weight: 700;
        }

        .output-row {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-top: 9px;
        }

        .output-chip {
            font-family: var(--mono);
            font-size: 11.5px;
            background: rgba(79, 216, 168, 0.08);
            border: 1px solid rgba(79, 216, 168, 0.3);
            color: var(--heap);
            padding: 4px 10px;
            border-radius: 6px;
            opacity: 0;
            animation: chipIn .35s ease forwards;
            align-self: flex-start;
        }

        @keyframes chipIn {
            from {
                opacity: 0;
                transform: scale(0.85);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .takeaway-card {
            margin-top: 13px;
            border-radius: 8px;
            padding: 11px 13px;
            font-size: 12px;
            border: 1px solid var(--line);
            border-left: 3px solid var(--heap);
            background: var(--panel-2);
            opacity: 0;
            animation: chipIn .4s ease forwards;
        }

        .takeaway-card .tt {
            font-weight: 700;
            font-size: 11px;
            color: var(--heap);
            margin-bottom: 4px;
        }

        .takeaway-card .td {
            color: var(--text-dim);
        }

        @media (max-width: 1000px) {
            .container {
                grid-template-columns: 1fr;
            }

            .step .step-label {
                display: none;
            }
        }

        @media (prefers-reduced-motion: reduce) {

            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>

<body>

    <div class="masthead">
        <h1><span class="dot"></span>OS Thread vs Goroutine — গভীর বিশ্লেষণ</h1>
        <div class="sub">kernel internals · GMP scheduler · Java/C++ comparison</div>
    </div>

    <div class="topic-tabs" id="topicTabs"></div>

    <div class="container">
        <div class="panel code-panel">
            <div class="panel-head">
                <div class="traffic"><span></span><span></span><span></span></div>
                <div class="filename" id="filenameTag">demo.go</div>
            </div>
            <div class="code-container" id="codeView"></div>
        </div>

        <div class="panel vis-panel">
            <div class="vis-head">
                <div class="label" id="visLabel">Internals</div>
                <div class="phase" id="phaseTag">idle</div>
            </div>
            <div class="vis-wrap" id="visWrap"></div>
        </div>

        <div class="panel bottom-panel">
            <div class="stepper">

                node: 7, phase: 'race condition example: 1000 goroutines', activeLines: [16, 17, 18, 19, 20, 21, 22, 23],
                console: `এবার দ্বিতীয় কোড — <span class="hl">for range 1000 { wg.Go(increment) }</span>। এখানে goroutine-গুলো সস্তা সেটা আগের ট্যাবগুলোতে দেখানো হয়েছে, কিন্তু সেটা একটা নতুন সমস্যা সামনে আনে: shared memory-তে একসাথে লেখা।`,
                render: () => render1000GoroutinesZone()
            },
            {
                node: 8, phase: '⚠️ without mutex: race condition', activeLines: [22],
                console: `যদি <span class="hl">mu.Lock()</span> না থাকতো, <span class="hl">counter++</span> আসলে তিনটা ধাপ — read, increment, write। দুটো goroutine একই সময়ে চলতে গিয়ে একে অপরের কাজ মুছে দিতে পারে। এটাই <span class="hl-stack">race condition</span>।`,
                render: () => renderRaceConditionZone(0)
            },
            {
                node: 9, phase: '✓ with mu.Lock()/Unlock()', activeLines: [20, 21],
                console: `<span class="hl">mu.Lock()</span> ... <span class="hl">defer mu.Unlock()</span> — এটা একটা mutual-exclusion lock। একটা সময়ে একটাই goroutine <span class="hl">counter++</span> লাইনে ঢুকতে পারে, বাকিরা দরজার বাইরে অপেক্ষা করে। এতে counter সবসময় ঠিক 1000-এ গিয়ে শেষ হবে।`,
                render: () => renderRaceConditionZone(1),
                output: 'Counter value is 1000',
                takeaway: { title: 'Practical Demo — মূল টেকঅ্যাওয়ে', detail: 'তোমার প্রথম কোড দেখায় কেন goroutine concurrency দিয়ে সময় বাঁচে (max, না sum)। দ্বিতীয় কোড দেখায় goroutine সস্তা হলেও shared-memory access নিরাপদ না — সস্তা concurrency আর নিরাপদ concurrency দুটো আলাদা সমস্যা, আর mutex হলো দ্বিতীয়টার সমাধান।' }
            }
        ];
        function demoStepsFn() { return demoSteps; }
        /* =========================================================================
           TOPIC REGISTRY — ties all 7 tabs together
        ========================================================================= */
        const topics = {
            osthread: { label: '1. OS Thread', filename: 'os_thread.c', code: osThreadCode, stepsFn: osThreadStepsFn, visLabel: 'Kernel Internals' },
            java: { label: '2. Java Thread', filename: 'JavaThread.java', code: javaCode, stepsFn: javaStepsFn, visLabel: 'JVM → pthread' },
            cpp: { label: '3. C++ Thread', filename: 'cpp_thread.cpp', code: cppCode, stepsFn: cppStepsFn, visLabel: 'std::thread' },
            goroutine: { label: '4. Goroutine', filename: 'goroutine.go', code: goroutineCode, stepsFn: goroutineStepsFn, visLabel: 'Runtime Internals' },
            gmp: { label: '5. GMP Scheduler', filename: 'gmp_scheduler.go', code: gmpCode, stepsFn: gmpStepsFn, visLabel: 'G-M-P Model' },
            compare: { label: '6. Cost Comparison', filename: 'comparison.md', code: compareCode, stepsFn: compareStepsFn, visLabel: 'Side by Side' },
            demo: { label: '7. Practical Demo', filename: 'your_code.go', code: demoCode, stepsFn: demoStepsFn, visLabel: 'Your Code' },
        };
        /* =========================================================================
           SHARED ENGINE — used by all topics
        ========================================================================= */
        const topicOrder = ['osthread', 'java', 'cpp', 'goroutine', 'gmp', 'compare', 'demo'];
        let activeTopic = 'osthread';
        let currentStep = -1;
        let activeSteps = [];

        const topicTabsEl = document.getElementById('topicTabs');
        function renderTopicTabs() {
            topicTabsEl.innerHTML = topicOrder.map(key => {
                const t = topics[key];
                return `<div class="topic-tab ${key === activeTopic ? 'active' : ''}" id="ttab-${key}" onclick="switchTopic('${key}')">
      <span class="tdot" style="background:${ACCENTS[key]}"></span>${t.label}
    </div>`;
            }).join('');
        }

        const codeView = document.getElementById('codeView');
        function renderCode(topicKey) {
            const t = topics[topicKey];
            codeView.innerHTML = t.code.map((l, i) => `<div class="line" id="line-${i}"><span class="ln">${i + 1}</span>${l.html}</div>`).join('');
            document.getElementById('filenameTag').textContent = t.filename;
            document.getElementById('visLabel').textContent = t.visLabel;
        }

        function highlightLines(activeLines, dimLines, kernelLines) {
            document.querySelectorAll('.line').forEach(el => el.classList.remove('active', 'faded', 'kernel-active'));
            (dimLines || []).forEach(i => { const el = document.getElementById(`line-${i}`); if (el) el.classList.add('faded'); });
            (activeLines || []).forEach(i => { const el = document.getElementById(`line-${i}`); if (el) el.classList.add('active'); });
            (kernelLines || []).forEach(i => { const el = document.getElementById(`line-${i}`); if (el) el.classList.add('kernel-active'); });
        }

        const stepTrackInner = document.getElementById('stepTrackInner');
        function renderStepperNodes(steps) {
            stepTrackInner.innerHTML = steps.map((s, i) => `
    <div class="step" id="step-${i}">
      <div class="step-node">${i + 1}</div>
      <div class="step-label">${(s.phase || '').length > 16 ? s.phase.slice(0, 14) + '…' : (s.phase || '')}</div>
    </div>`).join('');
        }

        function updateStepper(idx, total) {
            const accent = ACCENTS[activeTopic];
            document.querySelectorAll('.step').forEach((el, i) => {
                el.classList.remove('active', 'done');
                const node = el.querySelector('.step-node');
                node.style.borderColor = ''; node.style.background = ''; node.style.color = '';
                if (i < idx) { el.classList.add('done'); node.style.borderColor = accent; node.style.color = accent; }
                if (i === idx) { el.classList.add('active'); node.style.borderColor = accent; node.style.background = accent; node.style.color = '#06140f'; }
            });
            const pct = total > 1 ? (idx / (total - 1)) * 100 : 0;
            const bar = document.getElementById('stepperProgress');
            bar.style.width = (idx < 0 ? 0 : pct) + '%';
            bar.style.background = accent;
        }

        const visWrap = document.getElementById('visWrap');
        function renderStep(step) {
            highlightLines(step.activeLines, step.dimLines, step.kernelLines);
            document.getElementById('phaseTag').textContent = step.phase || '';
            visWrap.innerHTML = step.render();

            document.getElementById('consoleMsg').innerHTML = step.console;
            updateStepper(step.node, activeSteps.length);

            const extraRow = document.getElementById('extraRow');
            if (step.output) {
                let wrap = extraRow.querySelector('.output-row');
                if (!wrap) {
                    wrap = document.createElement('div');
                    wrap.className = 'output-row';
                    extraRow.appendChild(wrap);
                }
                const chip = document.createElement('div');
                chip.className = 'output-chip';
                chip.textContent = step.output;
                wrap.appendChild(chip);
            }
            if (step.takeaway) {
                const card = document.createElement('div');
                card.className = 'takeaway-card';
                card.innerHTML = `<div class="tt">${step.takeaway.title}</div><div class="td">${step.takeaway.detail}</div>`;
                extraRow.appendChild(card);
            }
        }

        function nextStep() {
            if (currentStep < activeSteps.length - 1) {
                currentStep++;
                renderStep(activeSteps[currentStep]);
                if (currentStep === activeSteps.length - 1) {
                    document.getElementById('btnNext').disabled = true;
                }
            }
        }

        function resetSim() {
            currentStep = -1;
            document.getElementById('extraRow').innerHTML = '';
            highlightLines([], [], []);
            document.getElementById('phaseTag').textContent = 'idle';
            updateStepper(-1, activeSteps.length);
            document.getElementById('btnNext').disabled = false;
            document.getElementById('consoleMsg').innerHTML = 'Press <b>Next step</b> to begin.';
            visWrap.innerHTML = '';
            if (activeSteps[0]) {
                visWrap.innerHTML = activeSteps[0].render();
            }
        }

        function switchTopic(key) {
            activeTopic = key;
            renderTopicTabs();
            renderCode(key);
            activeSteps = topics[key].stepsFn();
            renderStepperNodes(activeSteps);
            resetSim();
        }

        switchTopic('osthread');

    </script>
</body>

</html>
