<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buffered Channel Visualizer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0a0e14;
            --panel: #11161f;
            --panel-2: #0d121a;
            --line: #232b38;
            --line-soft: #1a212c;
            --text: #c7d0dc;
            --text-dim: #6b7686;
            --text-bright: #eef2f7;

            --stack: #ff8a7a;
            --stack-dim: #5a3934;
            --heap: #4fd8a8;
            --heap-dim: #2f4a3f;
            --code: #8aa6ff;
            --code-dim: #36406b;
            --pointer: #ffcc66;
            --value: #c792ea;

            --kw: #ff8a7a;
            --type: #ffb454;
            --str: #4fd8a8;
            --com: #5b6677;
            --fn: #8aa6ff;
            --num: #ffb454;

            --sans: 'Space Grotesk', system-ui, sans-serif;
            --mono: 'JetBrains Mono', 'Courier New', monospace;
            --radius: 10px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 28px 28px 40px;
            background:
                radial-gradient(circle at 18% -10%, rgba(138, 166, 255, 0.08), transparent 45%),
                radial-gradient(circle at 85% 0%, rgba(79, 216, 168, 0.06), transparent 40%),
                var(--bg);
            font-family: var(--sans);
            color: var(--text);
            min-height: 100vh;
        }

        .masthead {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            max-width: 1480px;
            margin: 0 auto 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--line-soft);
            flex-wrap: wrap;
            gap: 10px;
        }

        .masthead h1 {
            font-size: 21px;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--text-bright);
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .masthead h1 .dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: var(--pointer);
            box-shadow: 0 0 12px var(--pointer);
        }

        .masthead .sub {
            font-family: var(--mono);
            font-size: 11.5px;
            color: var(--text-dim);
            letter-spacing: 0.04em;
        }

        /* ---------- config panel ---------- */
        .config-panel {
            max-width: 1480px;
            margin: 0 auto 18px;
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            align-items: center;
            background: var(--panel-2);
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 14px 18px;
        }

        .config-group {
            display: flex;
            align-items: center;
            gap: 9px;
        }

        .config-label {
            font-family: var(--mono);
            font-size: 11.5px;
            color: var(--text-dim);
            letter-spacing: 0.04em;
        }

        .config-btns {
            display: flex;
            gap: 6px;
        }

        .config-btn {
            font-family: var(--mono);
            font-size: 13px;
            font-weight: 700;
            background: #161d27;
            color: var(--text-dim);
            border: 1.5px solid var(--line);
            width: 34px;
            height: 34px;
            border-radius: 8px;
            cursor: pointer;
            transition: all .2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .config-btn:hover {
            border-color: #3a4555;
        }

        .config-btn.active {
            color: #0a0e14;
            border-color: var(--pointer);
            background: var(--pointer);
            box-shadow: 0 0 12px rgba(255, 204, 102, 0.4);
        }

        .config-divider {
            width: 1px;
            height: 26px;
            background: var(--line);
        }

        .run-btn {
            font-family: var(--sans);
            font-weight: 700;
            font-size: 13px;
            background: linear-gradient(135deg, #2fae84, #4fd8a8);
            color: #06140f;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: all .15s ease;
            margin-left: auto;
        }

        .run-btn:hover {
            filter: brightness(1.08);
            transform: translateY(-1px);
        }

        .run-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .container {
            display: grid;
            grid-template-columns: 0.85fr 1.6fr;
            gap: 18px;
            max-width: 1480px;
            margin: 0 auto;
        }

        .panel {
            background: linear-gradient(180deg, var(--panel), var(--panel-2));
            border: 1px solid var(--line);
            border-radius: var(--radius);
            box-shadow: 0 1px 0 rgba(255, 255, 255, 0.02) inset, 0 14px 30px -18px rgba(0, 0, 0, 0.7);
            overflow: hidden;
        }

        .code-panel .panel-head {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            border-bottom: 1px solid var(--line-soft);
            background: rgba(255, 255, 255, 0.015);
        }

        .traffic {
            display: flex;
            gap: 6px;
        }

        .traffic span {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }

        .traffic span:nth-child(1) {
            background: #ff5f57;
        }

        .traffic span:nth-child(2) {
            background: #febc2e;
        }

        .traffic span:nth-child(3) {
            background: #28c840;
        }

        .filename {
            font-family: var(--mono);
            font-size: 12px;
            color: var(--text-dim);
            margin-left: 4px;
        }

        .code-container {
            font-family: var(--mono);
            line-height: 1.65;
            font-size: 12.6px;
            padding: 14px 0 18px;
            white-space: pre;
            overflow-x: auto;
            min-height: 540px;
            max-height: 640px;
            overflow-y: auto;
        }

        .line {
            position: relative;
            padding: 1px 16px 1px 46px;
            transition: background-color .25s ease, border-color .25s ease;
            border-left: 3px solid transparent;
        }

        .line .ln {
            position: absolute;
            left: 14px;
            width: 24px;
            text-align: right;
            color: #3a4250;
            font-size: 11px;
            user-select: none;
        }

        .line.active {
            background: linear-gradient(90deg, rgba(255, 204, 102, 0.16), rgba(255, 204, 102, 0.03) 70%);
            border-left-color: var(--pointer);
        }

        .line.faded {
            opacity: 0.4;
        }

        .line.dimmed-out {
            opacity: 0.22;
            text-decoration: line-through;
        }

        .kw {
            color: var(--kw);
            font-weight: 600;
        }

        .type {
            color: var(--type);
        }

        .com {
            color: var(--com);
            font-style: italic;
        }

        .fn {
            color: var(--fn);
        }

        .str {
            color: var(--str);
        }

        .num {
            color: var(--num);
        }

        .vis-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
            border-bottom: 1px solid var(--line-soft);
            background: rgba(255, 255, 255, 0.015);
        }

        .vis-head .label {
            font-size: 10.5px;
            letter-spacing: 0.1em;
            color: var(--text-dim);
            text-transform: uppercase;
            font-weight: 600;
        }

        .vis-head .phase {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--pointer);
            background: rgba(255, 204, 102, 0.08);
            border: 1px solid rgba(255, 204, 102, 0.25);
            padding: 3px 9px;
            border-radius: 20px;
        }

        .vis-head .clock {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text-bright);
            background: #161d27;
            border: 1px solid var(--line);
            padding: 3px 10px;
            border-radius: 20px;
        }

        .vis-wrap {
            position: relative;
            padding: 18px;
            min-height: 540px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .vis-zone {
            border-radius: 8px;
            padding: 13px;
            background: var(--panel-2);
            border: 1.5px solid var(--line);
        }

        .vis-zone-title {
            font-family: var(--mono);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.09em;
            color: var(--text-dim);
            margin-bottom: 11px;
            display: flex;
            align-items: center;
            gap: 7px;
            text-transform: uppercase;
        }

        .vis-zone-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: currentColor;
            opacity: 0.2;
        }

        /* goroutine lanes with progress bars */
        .lane {
            display: grid;
            grid-template-columns: 140px 1fr 90px;
            align-items: center;
            gap: 10px;
            padding: 9px 0;
            border-bottom: 1px solid var(--line-soft);
        }

        .lane:last-child {
            border-bottom: none;
        }

        .lane-name {
            font-family: var(--mono);
            font-size: 11.5px;
            font-weight: 700;
            color: var(--text-bright);
        }

        .lane-name .ln-sub {
            display: block;
            font-size: 9.5px;
            color: var(--text-dim);
            font-weight: 400;
            margin-top: 1px;
        }

        .lane-track {
            position: relative;
            height: 18px;
            background: #0d121a;
            border-radius: 9px;
            overflow: hidden;
            border: 1px solid var(--line-soft);
        }

        .lane-fill {
            height: 100%;
            border-radius: 9px;
            transition: width .3s linear;
            width: 0%;
        }

        .lane-status {
            font-family: var(--mono);
            font-size: 10.5px;
            text-align: right;
        }

        .lane-status.sleeping {
            color: var(--pointer);
        }

        .lane-status.pushing {
            color: var(--code);
        }

        .lane-status.blocked {
            color: var(--stack);
            font-weight: 700;
        }

        .lane-status.done {
            color: var(--heap);
        }

        /* channel buffer */
        .buffer-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .buffer-slot {
            width: 84px;
            height: 64px;
            border-radius: 9px;
            background: #161d27;
            border: 2px dashed var(--line);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--mono);
            font-size: 10px;
            color: var(--text-dim);
            text-align: center;
            padding: 4px;
            transition: all .35s cubic-bezier(.25, 1, .5, 1);
            position: relative;
        }

        .buffer-slot.filled {
            border-style: solid;
            border-color: var(--heap);
            background: rgba(79, 216, 168, 0.12);
            color: var(--text-bright);
            font-weight: 700;
            animation: slotFill .4s cubic-bezier(.25, 1, .5, 1);
        }

        @keyframes slotFill {
            from {
                transform: scale(0.7);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .buffer-slot.justEmptied {
            animation: slotEmpty .4s ease;
        }

        @keyframes slotEmpty {
            0% {
                background: rgba(255, 138, 122, 0.18);
                border-color: var(--stack);
            }

            100% {
                background: #161d27;
                border-color: var(--line);
            }
        }

        .buffer-cap-label {
            font-family: var(--mono);
            font-size: 10.5px;
            color: var(--text-dim);
        }

        /* waiting room */
        .waiting-room {
            min-height: 48px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
            padding: 8px;
            border-radius: 7px;
            background: #0d121a;
            border: 1px dashed var(--stack-dim);
        }

        .wait-chip {
            font-family: var(--mono);
            font-size: 11px;
            font-weight: 700;
            padding: 6px 12px;
            border-radius: 14px;
            background: rgba(255, 138, 122, 0.12);
            border: 1.5px solid var(--stack);
            color: var(--stack);
            animation: blockIn .3s ease;
        }

        @keyframes blockIn {
            from {
                opacity: 0;
                transform: translateY(4px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .wait-empty {
            font-family: var(--mono);
            font-size: 10.5px;
            color: var(--text-dim);
            font-style: italic;
        }

        /* consumer loop */
        .consumer-row {
            display: flex;
            gap: 9px;
            flex-wrap: wrap;
        }

        .consume-step {
            font-family: var(--mono);
            font-size: 11px;
            border-radius: 7px;
            padding: 8px 13px;
            background: #161d27;
            border: 1px solid var(--line);
            min-width: 140px;
            transition: all .3s ease;
        }

        .consume-step.active {
            border-color: var(--code);
            background: rgba(138, 166, 255, 0.1);
        }

        .consume-step.done {
            opacity: 0.6;
            border-color: var(--heap);
        }

        .consume-step.pending {
            opacity: 0.35;
            border-style: dashed;
        }

        .consume-step .cs-label {
            color: var(--text-dim);
            font-size: 9.5px;
            margin-bottom: 3px;
        }

        .consume-step .cs-val {
            color: var(--text-bright);
            font-weight: 700;
        }

        .leaked-warning {
            border-radius: 8px;
            padding: 12px 14px;
            font-family: var(--mono);
            font-size: 11.5px;
            background: rgba(255, 138, 122, 0.08);
            border: 1px solid rgba(255, 138, 122, 0.4);
            color: var(--stack);
        }

        .info-strip {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text-dim);
            padding: 8px 11px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.02);
            margin-top: 8px;
        }

        /* bottom panel */
        .bottom-panel {
            grid-column: 1 / -1;
            padding: 18px 20px;
        }

        .stepper {
            display: flex;
            justify-content: flex-start;
            align-items: flex-start;
            position: relative;
            margin-bottom: 20px;
            padding: 0 4px;
            overflow-x: auto;
        }

        .step-track {
            position: relative;
            flex: 1;
            min-width: 680px;
        }

        .step-track::before {
            content: '';
            position: absolute;
            top: 13px;
            left: 28px;
            right: 28px;
            height: 2px;
            background: var(--line);
            z-index: 1;
        }

        .step-track .progress {
            position: absolute;
            top: 13px;
            left: 28px;
            height: 2px;
            background: var(--pointer);
            z-index: 2;
            transition: width .35s cubic-bezier(.25, 1, .5, 1);
            width: 0%;
        }

        .step-track-inner {
            display: flex;
            justify-content: space-between;
            position: relative;
            z-index: 3;
        }

        .step {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            min-width: 50px;
        }

        .step-node {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--panel-2);
            border: 2px solid var(--line);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--mono);
            font-size: 9.5px;
            font-weight: 700;
            color: var(--text-dim);
            transition: all .3s ease;
        }

        .step.active .step-node {
            border-color: var(--pointer);
            background: var(--pointer);
            color: #1a1408;
            box-shadow: 0 0 12px rgba(255, 204, 102, 0.55);
        }

        .step.done .step-node {
            border-color: var(--code-dim);
            color: var(--pointer);
            background: transparent;
        }

        .step .step-label {
            font-size: 8px;
            color: var(--text-dim);
            text-align: center;
            max-width: 58px;
        }

        .step.active .step-label {
            color: var(--text-bright);
            font-weight: 600;
        }

        .controls {
            display: flex;
            gap: 12px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }

        button.ctrl-btn {
            font-family: var(--sans);
            font-weight: 600;
            font-size: 13px;
            background: var(--panel-2);
            color: var(--text);
            border: 1px solid var(--line);
            padding: 9px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all .15s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        button.ctrl-btn:hover:not(:disabled) {
            border-color: #3a4555;
            background: #161d27;
            transform: translateY(-1px);
        }

        button.ctrl-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }

        #btnNext {
            background: linear-gradient(135deg, #ffb454, #ffcc66);
            color: #1a1408;
            border-color: transparent;
        }

        #btnNext:hover:not(:disabled) {
            filter: brightness(1.08);
        }

        .console-box {
            background: #05070a;
            border: 1px solid var(--line);
            border-left: 3px solid var(--pointer);
            padding: 13px 15px;
            border-radius: 7px;
            font-size: 13px;
            line-height: 1.62;
            min-height: 50px;
            transition: border-left-color .3s ease;
        }

        .console-box .hl {
            color: var(--pointer);
            font-weight: 700;
        }

        .console-box .hl-heap {
            color: var(--heap);
            font-weight: 700;
        }

        .console-box .hl-stack {
            color: var(--stack);
            font-weight: 700;
        }

        .console-box .hl-code {
            color: var(--code);
            font-weight: 600;
            font-family: var(--mono);
            font-size: 12px;
        }

        .output-row {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-top: 9px;
        }

        .output-chip {
            font-family: var(--mono);
            font-size: 11.5px;
            background: rgba(79, 216, 168, 0.08);
            border: 1px solid rgba(79, 216, 168, 0.3);
            color: var(--heap);
            padding: 4px 10px;
            border-radius: 6px;
            opacity: 0;
            animation: chipIn .35s ease forwards;
            align-self: flex-start;
        }

        @keyframes chipIn {
            from {
                opacity: 0;
                transform: scale(0.85);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .takeaway-card {
            margin-top: 13px;
            border-radius: 8px;
            padding: 11px 13px;
            font-size: 12px;
            border: 1px solid var(--line);
            border-left: 3px solid var(--pointer);
            background: var(--panel-2);
            opacity: 0;
            animation: chipIn .4s ease forwards;
        }

        .takeaway-card .tt {
            font-weight: 700;
            font-size: 11px;
            color: var(--pointer);
            margin-bottom: 4px;
        }

        .takeaway-card .td {
            color: var(--text-dim);
        }

        @media (max-width: 1000px) {
            .container {
                grid-template-columns: 1fr;
            }

            .step .step-label {
                display: none;
            }
        }

        @media (prefers-reduced-motion: reduce) {

            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>

<body>

    <div class="masthead">
        <h1><span class="dot"></span>Buffered Channel — Slot &amp; Range Interaction</h1>
        <div class="sub">buffer capacity · blocking send · range count</div>
    </div>

    <div class="config-panel">
        <div class="config-group">
            <span class="config-label">buffer size (slot):</span>
            <div class="config-btns" id="bufBtns"></div>
        </div>
        <div class="config-divider"></div>
        <div class="config-group">
            <span class="config-label">range count (consumer loop):</span>
            <div class="config-btns" id="rangeBtns"></div>
        </div>
        <div class="config-divider"></div>
        <div class="config-group">
            <span class="config-label">timing:</span>
            <div class="config-btns" id="timingBtns"></div>
        </div>
        <button class="run-btn" id="btnRun" onclick="buildAndRun()">▶ Run এই কনফিগারেশনে</button>
    </div>

    <div class="container">
        <div class="panel code-panel">
            <div class="panel-head">
                <div class="traffic"><span></span><span></span><span></span></div>
                <div class="filename">channel_demo.go</div>
            </div>
            <div class="code-container" id="codeView"></div>
        </div>

        <div class="panel vis-panel">
            <div class="vis-head">
                <div class="label">Runtime Behaviour</div>
                <div style="display:flex;gap:8px;">
                    <div class="clock" id="clockTag">t = 0.0s</div>
                    <div class="phase" id="phaseTag">idle</div>
                </div>
            </div>
            <div class="vis-wrap" id="visWrap"></div>
        </div>

        <div class="panel bottom-panel">
            <div class="stepper">
                <div class="step-track" id="stepTrack">
                    <div class="progress" id="stepperProgress"></div>
                    <div class="step-track-inner" id="stepTrackInner"></div>
                </div>
            </div>

            <div class="controls">
                <button class="ctrl-btn" id="btnNext" onclick="nextStep()">Next step ▶</button>
                <button class="ctrl-btn" id="btnReset" onclick="resetSim()">↺ Reset</button>
            </div>

            <div class="console-box" id="consoleMsg">উপরে buffer size আর range count বেছে নিয়ে <b>Run</b> চাপো।</div>
            <div id="extraRow"></div>
        </div>
    </div>

    <script>
        /* =========================================================================
           CONFIG STATE
        ========================================================================= */
        let bufSize = 2;
        let rangeCount = 3;
        let timingMode = 'original';

        const bufBtnsEl = document.getElementById('bufBtns');
        const rangeBtnsEl = document.getElementById('rangeBtns');

        function renderConfigButtons() {
            bufBtnsEl.innerHTML = [1, 2, 3].map(n => `<div class="config-btn ${n === bufSize ? 'active' : ''}" onclick="setBuf(${n})">${n}</div>`).join('');
            rangeBtnsEl.innerHTML = [1, 2, 3].map(n => `<div class="config-btn ${n === rangeCount ? 'active' : ''}" onclick="setRange(${n})">${n}</div>`).join('');
            document.getElementById('timingBtns').innerHTML = [
                { id: 'original', label: 'তোমার কোড (1s,2s,3s)' },
                { id: 'stress', label: 'Stress test (block দেখাও)' }
            ].map(t => `<div class="config-btn" style="width:auto;padding:0 12px;font-size:11px;${t.id === timingMode ? '' : ''}" onclick="setTiming('${t.id}')" data-active="${t.id === timingMode}">${t.label}</div>`).join('');
            // apply active styling manually since width:auto buttons need the class too
            document.querySelectorAll('#timingBtns .config-btn').forEach(el => {
                if (el.dataset.active === 'true') el.classList.add('active');
            });
        }
        function setBuf(n) { bufSize = n; renderConfigButtons(); }
        function setRange(n) { rangeCount = n; renderConfigButtons(); }
        function setTiming(t) { timingMode = t; renderConfigButtons(); }
        renderConfigButtons();

        /* =========================================================================
           CODE TEMPLATE (regenerates based on bufSize/rangeCount)
        ========================================================================= */
        function buildCodeLines(buf, rng, mode) {
            const durs = mode === 'stress' ? { up: '1.0', db: '1.1', em: '1.2' } : { up: '2', db: '1', em: '3' };
            return [
                { html: '<span class="kw">func</span> main() {' },
                { html: `    ch := make(<span class="kw">chan</span> <span class="type">string</span>, <span class="num">${buf}</span>) <span class="com">// buffer = ${buf}</span>` },
                { html: '' },
                { html: `    <span class="kw">go</span> <span class="kw">func</span>() { <span class="com">// uploadFile (${durs.up}s)</span>` },
                { html: `        time.Sleep(<span class="num">${durs.up}</span> * time.Second)` },
                { html: '        ch &lt;- <span class="str">"file uploaded!"</span>' },
                { html: '    }()' },
                { html: '' },
                { html: `    <span class="kw">go</span> <span class="kw">func</span>() { <span class="com">// saveToDB (${durs.db}s)</span>` },
                { html: `        time.Sleep(<span class="num">${durs.db}</span> * time.Second)` },
                { html: '        ch &lt;- <span class="str">"file url saved!"</span>' },
                { html: '    }()' },
                { html: '' },
                { html: `    <span class="kw">go</span> <span class="kw">func</span>() { <span class="com">// sendEmail (${durs.em}s)</span>` },
                { html: `        time.Sleep(<span class="num">${durs.em}</span> * time.Second)` },
                { html: '        ch &lt;- <span class="str">"email sent!"</span>' },
                { html: '    }()' },
                { html: '' },
                { html: `    <span class="kw">for</span> <span class="kw">range</span> <span class="num">${rng}</span> { <span class="com">// consumer loop — only ${rng} receive(s)</span>` },
                { html: '        data := &lt;-ch' },
                { html: '        fmt.Println(data)' },
                { html: '    }' },
                { html: '}' },
            ];
        }

        const LINE = { FUNC: 0, MAKE: 1, UP_GO: 3, UP_SLEEP: 4, UP_SEND: 5, DB_GO: 8, DB_SLEEP: 9, DB_SEND: 10, EM_GO: 13, EM_SLEEP: 14, EM_SEND: 15, FOR: 17, RECV: 18, PRINT: 19 };

        /* =========================================================================
           SIMULATION BUILDER
           We simulate wall-clock events: each goroutine sleeps for its duration,
           then attempts to send. If buffer has room -> succeeds immediately (fills a slot).
           If full -> goroutine BLOCKS until a consumer receive() frees a slot.
           Consumer does exactly `rangeCount` receives, each receive happens "instantly"
           once at least one item is available in the buffer (FIFO).
           After rangeCount receives, main() returns -> any goroutine still blocked
           or not yet even attempted is abandoned (leaked).
        ========================================================================= */
        function simulate(buf, rng, timingMode) {
            // timingMode 'original' uses your exact code's sleep durations (1s, 2s, 3s) — with this much
            // gap between producers, the consumer almost always drains the buffer well before the next
            // producer arrives, so true buffer-full blocking is rare. timingMode 'stress' uses closer
            // sleep durations so you can actually SEE a producer get blocked and wait for a free slot —
            // same mechanism, just timed so it's visible.
            const producers = timingMode === 'stress'
                ? [
                    { id: 'upload', label: 'uploadFile', dur: 1.0, msg: 'file uploaded!' },
                    { id: 'db', label: 'saveToDB', dur: 1.1, msg: 'file url saved!' },
                    { id: 'email', label: 'sendEmail', dur: 1.2, msg: 'email sent!' },
                ]
                : [
                    { id: 'upload', label: 'uploadFile', dur: 2, msg: 'file uploaded!' },
                    { id: 'db', label: 'saveToDB', dur: 1, msg: 'file url saved!' },
                    { id: 'email', label: 'sendEmail', dur: 3, msg: 'email sent!' },
                ];

            // Model: each producer becomes "ready to send" at t = dur (after its sleep).
            // The consumer loop calls <-ch exactly `rng` times. Each receive takes a small,
            // realistic processing delay (RECV_DELAY) after the PREVIOUS receive (or t=0 for
            // the first one) — this models the fact that a receive is not infinitely fast,
            // so a producer CAN genuinely pile up and block if the buffer is smaller than
            // the number of producers that become ready before the consumer catches up.
            const RECV_DELAY = 0.4;

            // sort producers by readiness time (ties broken by declaration order)
            const readyEvents = producers.map((p, i) => ({ ...p, readyAt: p.dur, order: i }))
                .sort((a, b) => a.readyAt - b.readyAt || a.order - b.order);

            let bufQueue = [];      // FIFO of {producer,label,msg,time} currently sitting in the channel buffer
            let blockQueue = [];    // FIFO of producers blocked trying to send (buffer was full)
            let sendLog = [];       // narrative log of every send-related event, in time order
            let recvLog = [];       // narrative log of every successful receive, in time order
            let nextRecvAvailableAt = 0; // earliest time the NEXT receive call can complete

            // pointer into readyEvents for producers not yet attempted
            let sendPtr = 0;
            const pendingSends = readyEvents.map(p => ({ ...p, attempted: false }));

            function admitToBuffer(p, time) {
                bufQueue.push({ producer: p.id, label: p.label, msg: p.msg, time });
            }

            // Process events in strict time order: a "send attempt" happens at p.readyAt;
            // a "receive" happens at max(nextRecvAvailableAt, time something is available in buffer).
            // We simulate by repeatedly finding the earliest next event (next unattempted send,
            // or a receive becoming possible) and processing it, until we've done `rng` receives
            // or run out of sends to process.
            while (recvLog.length < rng) {
                // find earliest unattempted producer (by readyAt)
                const nextProducer = pendingSends.find(p => !p.attempted);
                // determine the earliest time a receive could happen: it needs something IN the buffer,
                // and must respect the RECV_DELAY pacing from the previous receive
                const bufferHasItemAt = bufQueue.length > 0 ? bufQueue[0].time : Infinity;
                const earliestReceiveTime = Math.max(nextRecvAvailableAt, bufferHasItemAt);

                if (nextProducer && nextProducer.readyAt <= earliestReceiveTime) {
                    // process this send attempt first (it happens no later than the next possible receive)
                    nextProducer.attempted = true;
                    const time = nextProducer.readyAt;
                    if (bufQueue.length < buf) {
                        admitToBuffer(nextProducer, time);
                        sendLog.push({ time, type: 'send-success', producer: nextProducer.id, label: nextProducer.label, msg: nextProducer.msg });
                    } else {
                        blockQueue.push({ producer: nextProducer.id, label: nextProducer.label, msg: nextProducer.msg, time });
                        sendLog.push({ time, type: 'send-blocked', producer: nextProducer.id, label: nextProducer.label, msg: nextProducer.msg });
                    }
                    continue;
                }

                if (bufQueue.length > 0 && earliestReceiveTime !== Infinity) {
                    // process a receive
                    const item = bufQueue.shift();
                    const time = earliestReceiveTime;
                    recvLog.push({ time, producer: item.producer, label: item.label, msg: item.msg });
                    nextRecvAvailableAt = time + RECV_DELAY;
                    // freed a slot -> admit oldest blocked sender, if any
                    if (blockQueue.length > 0) {
                        const admitted = blockQueue.shift();
                        admitToBuffer(admitted, time);
                        sendLog.push({ time, type: 'admit-from-block', producer: admitted.producer, label: admitted.label, msg: admitted.msg });
                    }
                    continue;
                }

                // nothing left to process (no more producers, no buffered items) — stop early
                if (!nextProducer && bufQueue.length === 0) break;
                if (!nextProducer && bufQueue.length > 0) {
                    // only remaining work is draining the buffer
                    const item = bufQueue.shift();
                    const time = Math.max(nextRecvAvailableAt, item.time);
                    recvLog.push({ time, producer: item.producer, label: item.label, msg: item.msg });
                    nextRecvAvailableAt = time + RECV_DELAY;
                    if (blockQueue.length > 0) {
                        const admitted = blockQueue.shift();
                        admitToBuffer(admitted, time);
                        sendLog.push({ time, type: 'admit-from-block', producer: admitted.producer, label: admitted.label, msg: admitted.msg });
                    }
                    continue;
                }
                break; // safety net against infinite loop
            }

            const admittedProducers = new Set(sendLog.filter(e => e.type === 'send-success' || e.type === 'admit-from-block').map(e => e.producer));
            const lastReceiveTime = recvLog.length > 0 ? recvLog[recvLog.length - 1].time : 0;
            const stillSleepingAtReturn = producers.filter(p => p.dur > lastReceiveTime && !admittedProducers.has(p.id));

            const abandonedIds = new Set([
                ...blockQueue.map(b => b.producer),
                ...bufQueue.map(b => b.producer),
                ...stillSleepingAtReturn.map(p => p.id)
            ]);
            const abandonedLabels = producers.filter(p => abandonedIds.has(p.id)).map(p => p.label);

            return { sendLog, recvLog, producers, buf, rng, blockQueueFinal: blockQueue, bufQueueFinal: bufQueue, abandonedLabels, returnTime: lastReceiveTime };
        }

        /* =========================================================================
           BUILD STEP TIMELINE FROM SIMULATION RESULT
        ========================================================================= */
        function buildSteps(buf, rng, timingMode) {
            const sim = simulate(buf, rng, timingMode);
            const steps = [];
            let node = 0;

            steps.push({
                node: node++, phase: 'goroutines launched', t: 0,
                activeLines: [LINE.UP_GO, LINE.DB_GO, LINE.EM_GO],
                console: `তিনটা goroutine launch হলো — <span class="hl">uploadFile (2s)</span>, <span class="hl">saveToDB (1s)</span>, <span class="hl">sendEmail (3s)</span>। Buffer size = <span class="hl">${buf}</span>, consumer loop = <span class="hl">range ${rng}</span>।`,
                state: { t: 0, buffer: [], blocked: [], received: [], laneStatus: { upload: 'sleeping', db: 'sleeping', email: 'sleeping' }, laneProgress: { upload: 0, db: 0, email: 0 } }
            });

            // merge sendLog and recvLog into a single time-ordered narrative
            const allEvents = [];
            sim.sendLog.forEach(e => allEvents.push({ ...e, kind: 'send' }));
            sim.recvLog.forEach(e => allEvents.push({ ...e, kind: 'recv' }));
            allEvents.sort((a, b) => {
                if (a.time !== b.time) return a.time - b.time;
                // at same time, sends before receives that consume them (already ordered via construction, but keep send-success before receive)
                if (a.kind === 'send' && b.kind === 'recv') return -1;
                if (a.kind === 'recv' && b.kind === 'send') return 1;
                return 0;
            });

            // running state we mutate as we narrate
            let buffer = [];
            let blocked = [];
            let received = [];
            let laneStatus = { upload: 'sleeping', db: 'sleeping', email: 'sleeping' };
            let laneProgress = { upload: 0, db: 0, email: 0 };

            const labelToId = { 'uploadFile': 'upload', 'saveToDB': 'db', 'sendEmail': 'email' };

            for (const ev of allEvents) {
                const pid = labelToId[ev.label];
                laneProgress[pid] = 100;
                if (ev.kind === 'send' && ev.type === 'send-success') {
                    buffer.push({ id: pid, label: ev.label, msg: ev.msg });
                    laneStatus[pid] = 'done-buffered';
                    steps.push({
                        node: node++, phase: `${ev.label} → slot পেলো`, t: ev.time,
                        activeLines: pid === 'upload' ? [LINE.UP_SEND] : (pid === 'db' ? [LINE.DB_SEND] : [LINE.EM_SEND]),
                        console: `<span class="hl">t = ${ev.time}s</span> — <span class="hl-heap">${ev.label}</span> ঘুম থেকে উঠে <span class="hl">ch &lt;- "${ev.msg}"</span> পাঠাতে চাইলো। Buffer-এ জায়গা ছিল (${buffer.length}/${buf}), তাই <span class="hl-heap">সাথে সাথে স্লট পেয়ে গেলো</span> — block হতে হলো না।`,
                        state: { t: ev.time, buffer: [...buffer], blocked: [...blocked], received: [...received], laneStatus: { ...laneStatus }, laneProgress: { ...laneProgress } }
                    });
                } else if (ev.kind === 'send' && ev.type === 'send-blocked') {
                    blocked.push({ id: pid, label: ev.label, msg: ev.msg });
                    laneStatus[pid] = 'blocked';
                    steps.push({
                        node: node++, phase: `${ev.label} → ব্লকড!`, t: ev.time,
                        activeLines: pid === 'upload' ? [LINE.UP_SEND] : (pid === 'db' ? [LINE.DB_SEND] : [LINE.EM_SEND]),
                        console: `<span class="hl">t = ${ev.time}s</span> — <span class="hl-stack">${ev.label}</span> পাঠাতে চাইলো, কিন্তু buffer পূর্ণ (${buffer.length}/${buf})! এই goroutine এখন <span class="hl-stack">ব্লক</span> হয়ে waiting room-এ গেলো — কোনো consumer slot খালি না করা পর্যন্ত এটা এখানেই আটকে থাকবে।`,
                        state: { t: ev.time, buffer: [...buffer], blocked: [...blocked], received: [...received], laneStatus: { ...laneStatus }, laneProgress: { ...laneProgress } }
                    });
                } else if (ev.kind === 'send' && ev.type === 'admit-from-block') {
                    // remove from blocked, add to buffer
                    blocked = blocked.filter(b => b.id !== pid);
                    buffer.push({ id: pid, label: ev.label, msg: ev.msg });
                    laneStatus[pid] = 'done-buffered';
                    steps.push({
                        node: node++, phase: `${ev.label} → স্লট খালি পেলো`, t: ev.time,
                        activeLines: pid === 'upload' ? [LINE.UP_SEND] : (pid === 'db' ? [LINE.DB_SEND] : [LINE.EM_SEND]),
                        console: `একটা slot খালি হওয়ায় waiting room থেকে <span class="hl-heap">${ev.label}</span> এখন buffer-এ ঢুকতে পারলো — এটাই <span class="hl">"slot ফ্রি পাওয়ার"</span> মুহূর্ত যা তুমি জানতে চেয়েছিলে।`,
                        state: { t: ev.time, buffer: [...buffer], blocked: [...blocked], received: [...received], laneStatus: { ...laneStatus }, laneProgress: { ...laneProgress } }
                    });
                } else if (ev.kind === 'recv') {
                    buffer = buffer.filter(b => !(b.id === pid && b.msg === ev.msg) || false); // remove first matching by FIFO — simpler: remove first item
                    // proper FIFO removal: remove the first buffer entry (since recvLog already reflects FIFO order)
                    buffer.shift();
                    received.push({ id: pid, label: ev.label, msg: ev.msg });
                    steps.push({
                        node: node++, phase: `receive #${received.length}`, t: ev.time,
                        activeLines: [LINE.RECV, LINE.PRINT],
                        console: `<span class="hl-code">data := &lt;-ch</span> — consumer loop <span class="hl">receive #${received.length}</span>: buffer থেকে <span class="hl">"${ev.msg}"</span> তুলে নিলো (FIFO — যেটা আগে buffer-এ ঢুকেছিল)। এতে একটা স্লট খালি হলো।`,
                        state: { t: ev.time, buffer: [...buffer], blocked: [...blocked], received: [...received], laneStatus: { ...laneStatus }, laneProgress: { ...laneProgress } },
                        output: ev.msg
                    });
                }
            }

            // final step: main returns, check for abandoned goroutines (uses corrected detection from simulate())
            const abandonedSenders = sim.abandonedLabels;

            let finalConsole = `<span class="hl">for range ${rng}</span> লুপ ${rng} বার receive করে শেষ — main() এখন return করবে (t ≈ ${sim.returnTime}s)।`;
            if (abandonedSenders.length > 0) {
                finalConsole += ` <span class="hl-stack">⚠️ সমস্যা:</span> <span class="hl-stack">${abandonedSenders.join(', ')}</span> তখনো কাজ শেষ করতে পারেনি (ব্লকড, বাফারে অপঠিত, বা তখনো sleep করছিল) — কিন্তু main() return করে গেলে <span class="hl-stack">প্রোগ্রামই বন্ধ হয়ে যায়</span>, এই অসম্পূর্ণ goroutine সম্পূর্ণ <span class="hl-stack">abandoned (leaked)</span> থেকে যায়, কোনো error বা panic ছাড়াই — silently।`;
            } else {
                finalConsole += ` <span class="hl-heap">✓ সব তিনটা goroutine-ই</span> তাদের ডাটা সফলভাবে পাঠিয়েছে এবং consumer সবগুলোই receive করেছে — কোনো leak নেই।`;
            }

            // fix up lane status for any producer that never got admitted (abandoned at return time)
            const admittedSet = new Set(sim.sendLog.filter(e => e.type === 'send-success' || e.type === 'admit-from-block').map(e => e.producer));
            const producerDurMap = { upload: 2, db: 1, email: 3 };
            ['upload', 'db', 'email'].forEach(pid => {
                if (!admittedSet.has(pid) && !buffer.some(b => b.id === pid)) {
                    laneStatus[pid] = 'abandoned';
                    const elapsedPct = Math.min(100, (sim.returnTime / producerDurMap[pid]) * 100);
                    laneProgress[pid] = elapsedPct;
                }
            });

            steps.push({
                node: node++, phase: 'main() returns', t: sim.returnTime,
                activeLines: [20],
                console: finalConsole,
                state: { t: sim.returnTime, buffer: [...buffer], blocked: [...blocked], received: [...received], laneStatus: { ...laneStatus }, laneProgress: { ...laneProgress } },
                leaked: abandonedSenders,
                takeaway: rng < 3
                    ? { title: 'range কম নেওয়ার ফল', detail: `range ${rng} মানে consumer মাত্র ${rng} বার receive করবে। বাকি যেসব goroutine তখনো sleep করছিল, block অবস্থায় ছিল, বা buffer-এ পড়ার অপেক্ষায় ছিল — main() return করার সাথে সাথেই সেগুলো বাতিল হয়ে যায়। Go কোনো warning দেয় না, প্রোগ্রাম স্বাভাবিকভাবেই শেষ হয়ে যায়, কিন্তু সেই কাজ (যেমন email পাঠানো) সম্পূর্ণ না হতেও পারে।` }
                    : { title: 'সঠিক range = সঠিক ফল', detail: `buffer ছোট হলেও (এমনকি buffer=1 হলেও), যদি consumer ঠিক producer-সংখ্যক বার receive করে (range ${rng}, producer ৩টা), সব ডাটা ঠিকভাবে আসবে — শুধু কিছু goroutine বেশি সময় block হয়ে অপেক্ষা করবে, কিন্তু কোনো ডাটা হারাবে না।` }
            });

            return steps;
        }

        /* =========================================================================
           RENDER
        ========================================================================= */
        const codeView = document.getElementById('codeView');
        let currentSteps = [];
        let currentStepIdx = -1;
        let currentBuf = 2, currentRng = 3, currentTiming = 'original';

        function renderCode(buf, rng, mode) {
            const lines = buildCodeLines(buf, rng, mode);
            codeView.innerHTML = lines.map((l, i) => `<div class="line" id="line-${i}"><span class="ln">${i + 1}</span>${l.html}</div>`).join('');
        }

        function highlightLines(activeLines) {
            document.querySelectorAll('.line').forEach(el => el.classList.remove('active'));
            (activeLines || []).forEach(i => { const el = document.getElementById(`line-${i}`); if (el) el.classList.add('active'); });
        }

        const stepTrackInner = document.getElementById('stepTrackInner');
        function renderStepperNodes(steps) {
            stepTrackInner.innerHTML = steps.map((s, i) => `
    <div class="step" id="step-${i}">
      <div class="step-node">${i + 1}</div>
      <div class="step-label">${(s.phase || '').length > 14 ? s.phase.slice(0, 12) + '…' : (s.phase || '')}</div>
    </div>`).join('');
        }

        function updateStepper(idx, total) {
            document.querySelectorAll('.step').forEach((el, i) => {
                el.classList.remove('active', 'done');
                if (i < idx) el.classList.add('done');
                if (i === idx) el.classList.add('active');
            });
            const pct = total > 1 ? (idx / (total - 1)) * 100 : 0;
            document.getElementById('stepperProgress').style.width = (idx < 0 ? 0 : pct) + '%';
        }

        function renderLanes(state, mode) {
            const producers = mode === 'stress'
                ? [
                    { id: 'upload', label: 'uploadFile', sub: 'sleep 1.0s', dur: 1.0, color: 'var(--code)' },
                    { id: 'db', label: 'saveToDB', sub: 'sleep 1.1s', dur: 1.1, color: 'var(--value)' },
                    { id: 'email', label: 'sendEmail', sub: 'sleep 1.2s', dur: 1.2, color: 'var(--pointer)' },
                ]
                : [
                    { id: 'upload', label: 'uploadFile', sub: 'sleep 2s', dur: 2, color: 'var(--code)' },
                    { id: 'db', label: 'saveToDB', sub: 'sleep 1s', dur: 1, color: 'var(--value)' },
                    { id: 'email', label: 'sendEmail', sub: 'sleep 3s', dur: 3, color: 'var(--pointer)' },
                ];
            const statusLabel = s => s === 'sleeping' ? 'sleeping...' : (s === 'blocked' ? 'BLOCKED' : (s === 'done-buffered' ? 'sent → buffer' : (s === 'abandoned' ? 'ABANDONED!' : '—')));
            const statusClass = s => s === 'sleeping' ? 'sleeping' : (s === 'blocked' ? 'blocked' : (s === 'done-buffered' ? 'done' : (s === 'abandoned' ? 'blocked' : 'sleeping')));

            return `
    <div class="vis-zone">
      <div class="vis-zone-title">৩টা producer goroutine — sleep progress</div>
      ${producers.map(p => {
                const status = state.laneStatus[p.id];
                const progress = state.laneProgress[p.id];
                return `<div class="lane">
          <div class="lane-name">${p.label}<span class="ln-sub">${p.sub}</span></div>
          <div class="lane-track"><div class="lane-fill" style="width:${progress}%; background:linear-gradient(90deg, ${p.color}55, ${p.color});"></div></div>
          <div class="lane-status ${statusClass(status)}">${statusLabel(status)}</div>
        </div>`;
            }).join('')}
    </div>`;
        }

        function renderBuffer(state, buf) {
            const slots = [];
            for (let i = 0; i < buf; i++) {
                const item = state.buffer[i];
                slots.push(item
                    ? `<div class="buffer-slot filled">${item.label}<br><span style="font-size:8.5px;opacity:0.8;">"${item.msg}"</span></div>`
                    : `<div class="buffer-slot">empty</div>`
                );
            }
            return `
    <div class="vis-zone">
      <div class="vis-zone-title">channel buffer <span class="buffer-cap-label">(capacity = ${buf})</span></div>
      <div class="buffer-row">${slots.join('')}</div>
      <div class="info-strip">${state.buffer.length}/${buf} স্লট ভর্তি</div>
    </div>`;
        }

        function renderWaitingRoom(state) {
            return `
    <div class="vis-zone">
      <div class="vis-zone-title">waiting room — buffer পূর্ণ থাকায় ব্লক হয়ে আছে</div>
      <div class="waiting-room">
        ${state.blocked.length === 0 ? '<span class="wait-empty">(কেউ ব্লক হয়ে নেই)</span>' :
                    state.blocked.map(b => `<div class="wait-chip">⏳ ${b.label}</div>`).join('')}
      </div>
    </div>`;
        }

        function renderConsumerProgress(state, rng) {
            const slots = [];
            for (let i = 0; i < rng; i++) {
                const item = state.received[i];
                slots.push(`<div class="consume-step ${item ? 'done' : 'pending'}">
      <div class="cs-label">receive #${i + 1}</div>
      <div class="cs-val">${item ? `"${item.msg}"` : 'pending...'}</div>
    </div>`);
            }
            return `
    <div class="vis-zone">
      <div class="vis-zone-title">consumer loop — for range ${rng}</div>
      <div class="consumer-row">${slots.join('')}</div>
    </div>`;
        }

        function renderVis(step, buf, rng, mode) {
            let html = renderLanes(step.state, mode) + renderBuffer(step.state, buf) + renderWaitingRoom(step.state) + renderConsumerProgress(step.state, rng);
            if (step.leaked && step.leaked.length > 0) {
                html += `<div class="leaked-warning">⚠️ LEAKED / ABANDONED: ${step.leaked.join(', ')} — main() return করায় এদের কাজ অসম্পূর্ণ রয়ে গেলো, কোনো crash বা error ছাড়াই।</div>`;
            }
            return html;
        }

        const visWrap = document.getElementById('visWrap');
        function renderStep(step, buf, rng, mode) {
            highlightLines(step.activeLines);
            document.getElementById('phaseTag').textContent = step.phase || '';
            document.getElementById('clockTag').textContent = `t = ${step.t.toFixed(1)}s`;
            visWrap.innerHTML = renderVis(step, buf, rng, mode);

            document.getElementById('consoleMsg').innerHTML = step.console;
            updateStepper(step.node, currentSteps.length);

            const extraRow = document.getElementById('extraRow');
            if (step.output) {
                let wrap = extraRow.querySelector('.output-row');
                if (!wrap) {
                    wrap = document.createElement('div');
                    wrap.className = 'output-row';
                    extraRow.appendChild(wrap);
                }
                const chip = document.createElement('div');
                chip.className = 'output-chip';
                chip.textContent = step.output;
                wrap.appendChild(chip);
            }
            if (step.takeaway) {
                const card = document.createElement('div');
                card.className = 'takeaway-card';
                card.innerHTML = `<div class="tt">${step.takeaway.title}</div><div class="td">${step.takeaway.detail}</div>`;
                extraRow.appendChild(card);
            }
        }

        function nextStep() {
            if (currentStepIdx < currentSteps.length - 1) {
                currentStepIdx++;
                renderStep(currentSteps[currentStepIdx], currentBuf, currentRng, currentTiming);
                if (currentStepIdx === currentSteps.length - 1) {
                    document.getElementById('btnNext').disabled = true;
                }
            }
        }

        function resetSim() {
            currentStepIdx = -1;
            document.getElementById('extraRow').innerHTML = '';
            highlightLines([]);
            document.getElementById('phaseTag').textContent = 'idle';
            document.getElementById('clockTag').textContent = 't = 0.0s';
            updateStepper(-1, currentSteps.length);
            document.getElementById('btnNext').disabled = false;
            document.getElementById('consoleMsg').innerHTML = 'Press <b>Next step</b> to begin.';
            visWrap.innerHTML = currentSteps[0] ? renderVis(currentSteps[0], currentBuf, currentRng, currentTiming) : '';
        }

        function buildAndRun() {
            currentBuf = bufSize;
            currentRng = rangeCount;
            currentTiming = timingMode;
            renderCode(currentBuf, currentRng, currentTiming);
            currentSteps = buildSteps(currentBuf, currentRng, currentTiming);
            renderStepperNodes(currentSteps);
            resetSim();
        }

        /* init */
        renderCode(bufSize, rangeCount, timingMode);
        buildAndRun();
    </script>
</body>

</html>
